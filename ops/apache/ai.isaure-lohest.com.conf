<VirtualHost *:80>
    ServerName ai.isaure-lohest.com
    ServerAdmin contact@isaure-lohest.com

    DocumentRoot /var/www/html/isaure/sites/ai.isaure-lohest.com/current

    ErrorLog ${APACHE_LOG_DIR}/ai.isaure-lohest.com-error.log
    CustomLog ${APACHE_LOG_DIR}/ai.isaure-lohest.com-access.log combined

    <Directory /var/www/html/isaure/sites/ai.isaure-lohest.com/current>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>
