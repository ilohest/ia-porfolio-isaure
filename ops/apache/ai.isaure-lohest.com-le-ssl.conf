<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ai.isaure-lohest.com
    ServerAdmin contact@isaure-lohest.com

    DocumentRoot /var/www/html/isaure/sites/ai.isaure-lohest.com/current

    ErrorLog ${APACHE_LOG_DIR}/ai.isaure-lohest.com-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/ai.isaure-lohest.com-ssl-access.log combined

    <Directory /var/www/html/isaure/sites/ai.isaure-lohest.com/current>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "SAMEORIGIN"

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/ai.isaure-lohest.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ai.isaure-lohest.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
